# Spark BiCodec multilingual baseline for English/Hindi/Telugu

[job]
dump_folder = "./outputs"
description = "TinyAya Spark BiCodec Q1 FLEURS EN-HI-TE Baseline"

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 50

[metrics]
log_freq = 10
enable_tensorboard = true
save_tb_folder = "tb"
enable_wandb = true

[model]
name = "CohereLabs/tiny-aya-fire"
num_quantizers = 1
pretrained = true

[audio_codec]
backend = "spark_bicodec"
source = "hf_pretrained"
model_id = "SparkAudio/Spark-TTS-0.5B"
codec_ckpt_path = ""
codebook_size_override = 8192
max_codebooks = 1
sample_rate_override = 16000
trust_remote_code = false

[optimizer]
name = "AdamW"
lr = 3e-5
eps = 1e-8

[lr_scheduler]
warmup_steps = 500
decay_ratio = 0.8
lr_min = 0.1

[training]
local_batch_size = 1
global_batch_size = 8
seq_len = 4096
max_norm = 1.0
steps = 20000
compile = false
dataset = "fleurs_pretok"
dataset_path = "/vol/data/fleurs_pretok_spark_q1_ehite"
task = "tts"
max_audio_seconds = 20
mask_text_loss = true
language_tokens = true
languages = ["en", "hi", "te"]
overfit_num_samples = 0
sample_generate_every = 500
sample_generate_max_new_tokens = 1024
sample_generate_do_sample = false
sample_generate_temperature = 0.8
sample_generate_top_k = 30
sample_generate_num_samples = 3
sample_generate_dual_mode = true
sample_generate_restrict_audio_vocab = true
overfit_require_generated_audio = false
overfit_generated_audio_deadline_step = 0
metrics_ema_beta = 0.98
minimal_media_logging = true
log_target_media = false
log_unconstrained_named_media = false

[experiment]
id = "baseline_spark_q1_fleurs_ehite"
phase = "baseline_spark_q1_fleurs_ehite"
question = "Can TinyAya learn a stable multilingual TTS baseline on English, Hindi, and Telugu using Spark BiCodec Q1?"
hypothesis = "A low-complexity semantic codec baseline should give the first reliable multilingual intelligibility track before moving to richer acoustic representations."
owner = "codex"
tags = ["tinyaya", "tts", "baseline", "spark_bicodec", "q1", "fleurs", "en", "hi", "te", "multilingual"]

[tts_eval]
enabled = true
eval_every = 500
asr_model_id = "openai/whisper-small"
compute_wer = true
compute_cer = true

[overfit_gate]
require_unconstrained_audio = false
audio_deadline_step = 0
wer_max = 0.35
cer_max = 0.18
frame_ratio_min = 0.55
frame_ratio_max = 1.60
coverage_abs_diff_max = 0.03
coverage_q_min = 0.01
coverage_q_abs_diff_max = 0.15
min_consecutive_passes = 3
fail_on_no_pass = false

[artifact]
dump_root = ""
save_local_audio_wav = true
save_local_codebook_csv = true
save_local_markdown = true
save_git_snapshot = true

[validation]
enabled = true
dataset = "fleurs_pretok"
local_batch_size = 1
seq_len = 4096
freq = 500
steps = 16

[evaluation]
enable_evaluation = false
evaluation_freq = 1000

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = 1
tensor_parallel_degree = 1
pipeline_parallel_degree = 1
context_parallel_degree = 1

[checkpoint]
enable_checkpoint = true
folder = "checkpoint_spark_q1_fleurs_ehite_baseline"
interval = 2000
last_save_model_only = true
export_dtype = "float32"
async_mode = "async"
keep_latest_k = 2

[activation_checkpoint]
mode = "none"
selective_ac_option = "op"

[float8]
enable_fsdp_float8_all_gather = false
precompute_float8_dynamic_scale_for_fsdp = false
filter_fqns = ["output"]
